<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sifenboot · Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
    <script th:src="@{/js/ui-utils.js}" src="/js/ui-utils.js"></script>
    <script th:src="@{/js/auth.js}" src="/js/auth.js"></script>

</head>
<body>


<div class="center-screen">
    <div class="w-full max-w-[380px] fade-in">


        <div class="card">

            <div class="text-center mb-8">
                <h1 class="mt-2 text-2xl font-bold tracking-tight text-gray-900">Iniciar Sesión</h1>
            </div>



            <form id="loginForm"  autocomplete="off">
                <div class="form-group">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Tu usuario" required>
                </div>

                <div class="form-group"> <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-actions actions-stack">
                    <button type="submit" class="btn btn-lg">
                        Ingresar al Sistema
                    </button>
                </div>

            </form>



        </div>


    </div>
</div>

<script type="module">
    const form = document.getElementById('loginForm');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = Object.fromEntries(new FormData(form));

        try {
            const response = await fetch('/app/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                const user = await response.json();
                localStorage.setItem('token', user.accessToken);

                // Éxito: Feedback visual antes de saltar al dashboard
                showAlert('¡Bienvenido! Iniciando sesión...', 'success');

                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 1000);
            } else {
                const errorData = await response.json();
                // Error de credenciales: Usamos tu alerta flat roja
                showAlert(errorData.message || 'Usuario o contraseña incorrectos', 'error');
            }
        } catch (err) {
            // Error de red/servidor: Usamos tu alerta flat roja
            showAlert('Error de conexión con el servidor Sifenboot', 'error');
            console.error("Error en la petición:", err);
        }
    });
</script>
</body>
</html>
