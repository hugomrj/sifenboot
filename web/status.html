<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sifenboot Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #FFFFFF;
            --text-main: #1A1A1A;
            --text-muted: #AAAAAA;
            --ui-surface: #F5F5F7;
            --status-ok: #22C55E;
            --status-warn: #F59E0B;
            --status-err: #EF4444;
            --radius-full: 9999px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-page);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }

        body.is-loading {
            cursor: wait;
        }

        /* Cuando está cargando, anular cualquier efecto hover/focus en elementos interactivos */
        body.is-loading button,
        body.is-loading select,
        body.is-loading .select-arrow {
            cursor: wait;
        }

        body.is-loading button:hover,
        body.is-loading button:active,
        body.is-loading select:hover,
        body.is-loading select:focus,
        body.is-loading .form-group:hover .select-arrow {
            background: none;          /* Evita cambios de fondo */
            transform: none;           /* Sin transformaciones */
            box-shadow: none;          /* Sin sombras */
            border-color: transparent; /* Sin cambios de borde */
            color: inherit;            /* Sin cambios de color */
        }

        body.is-loading button {
            background: var(--ui-surface);
            color: #AAAAAA;
        }

        body.is-loading select {
            background: var(--ui-surface);
            color: var(--text-muted);
        }

        .container {
            width: 100%;
            max-width: 360px;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 0.8125rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        select {
            width: 100%;
            padding: 14px 44px 14px 16px;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-main);
            background: var(--ui-surface);
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            cursor: pointer;
            outline: none;
            appearance: none;
        }



        /* Efecto hover normal (solo cuando NO está en carga) */
        select:hover:not(.is-loading *) {
            background: #EBEBEF;
        }

        select:focus {
            background: #fff;
            border-color: rgba(0,0,0,0.1);
        }


        .select-arrow {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            pointer-events: none;
            color: var(--text-muted);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--text-main);
            color: #fff;
            border: none;
            border-radius: var(--radius-full);
            font-family: inherit;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
        }

        button:hover:not(:disabled) {
            background: #2c2c2c;
        }

        button:active:not(:disabled) {
            background: #111;
        }

        button:disabled {
            background: var(--ui-surface);
            color: #AAAAAA;
            cursor: wait;
        }

        .results {
            margin-top: 48px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .results.active {
            opacity: 1;
            transform: translateY(0);
        }

        .status-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 10px 0;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse-soft 2s infinite;
        }

        .status-hero {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .metrics {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #F0F0F0;
        }

        .metric-value {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        .metric-label {
            font-size: 0.6875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .idle-text {
            color: #DDDDDD;
            font-size: 0.875rem;
            margin-top: 20px;
            display: block;
        }

        @keyframes pulse-soft {
            0% { box-shadow: 0 0 0 0 currentColor; opacity: 1; }
            70% { box-shadow: 0 0 0 6px transparent; opacity: 0.6; }
            100% { box-shadow: 0 0 0 0 transparent; opacity: 1; }
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .is-ok { color: var(--status-ok); }
        .is-warn { color: var(--status-warn); }
        .is-err { color: var(--status-err); }

        @media (max-width: 480px) {
            .status-hero { font-size: 1.5rem; }
        }
    </style>
</head>
<body id="main-body">

<div class="container">
    <div class="header">
        <h1>Sifenboot · Entorno</h1>
    </div>

    <div class="form-group">

        <select id="env-select">
            <option value="prod">Produccion</option>
            <option value="test" selected>Testing</option>
        </select>
        <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
    </div>

    <button id="exec-btn" onclick="run()">Verificar Estado</button>

    <div id="out" class="results">
        <span class="idle-text">Esperando instruccion</span>
    </div>
</div>

<script>
    async function run() {
        const env = document.getElementById('env-select').value;
        const btn = document.getElementById('exec-btn');
        const out = document.getElementById('out');
        const body = document.getElementById('main-body');

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Verificando';
        body.classList.add('is-loading');

        out.classList.remove('active');
        out.innerHTML = '<span class="idle-text">Conectando...</span>';

        try {
            const response = await fetch(`api/sifen/status/${env}`);
            const data = await response.json();

            let statusClass = 'is-err';
            let statusText = 'Sin respuesta';

            if (data.httpCode === 200) {
                statusClass = 'is-ok';
                statusText = 'Operativo';
            } else if (data.httpCode >= 500) {
                statusClass = 'is-err';
                statusText = 'Error';
            } else {
                statusClass = 'is-warn';
                statusText = 'Inestable';
            }

            out.innerHTML = `
                <div class="status-container">
                    <span class="status-dot ${statusClass}"></span>
                    <div class="status-hero ${statusClass}">${statusText}</div>
                </div>
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-value">${data.ms}ms</div>
                        <div class="metric-label">Latencia</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">${data.httpCode || 'N/A'}</div>
                        <div class="metric-label">HTTP</div>
                    </div>
                </div>
            `;

            requestAnimationFrame(() => {
                out.classList.add('active');
            });

        } catch (e) {
            out.innerHTML = `
                <div class="status-container">
                    <span class="status-dot is-err"></span>
                    <div class="status-hero is-err">Error de Red</div>
                </div>
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-value">CORS</div>
                        <div class="metric-label">Detalle</div>
                    </div>
                </div>
            `;
            requestAnimationFrame(() => {
                out.classList.add('active');
            });
        } finally {
            btn.disabled = false;
            btn.innerText = 'Verificar Estado';
            body.classList.remove('is-loading');
        }
    }
</script>

</body>
</html>
