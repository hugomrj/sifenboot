<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sifenboot · Dashboard</title>

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind primero -->
    <script th:src="@{/js/tailwind.js}" src="/js/tailwind.js"></script>

    <!-- Tu CSS después (para sobrescribir si hace falta) -->
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">

    <!-- Librerías -->
    <script th:src="@{/js/htmx.min.js}" src="/js/htmx.min.js"></script>

    <!-- Scripts propios -->
    <script th:src="@{/js/ui-utils.js}" src="/js/ui-utils.js"></script>
    <script th:src="@{/js/auth.js}" src="/js/auth.js"></script>
</head>

<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<header class="top-navbar">
    <div class="flex items-center gap-3">
        <button class="menu-toggle" id="menuToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <div class="navbar-logo">Sifenboot</div>
    </div>

    <div class="flex items-center gap-4">
        <a href="#" id="logoutAction" class="logout-btn" title="Cerrar Sesión">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
                <line x1="12" y1="2" x2="12" y2="12"></line>
            </svg>
        </a>
    </div>

</header>

<div class="dashboard-layout">

    <aside class="sidebar" id="sidebar">
        <nav>
            <div class="nav-content">
                <div class="nav-group">
                    <a href="/dashboard" class="nav-item active">
                        Inicio
                    </a>
                </div>

                <div class="nav-group">
                    <div class="nav-item toggle-submenu">
                        <span>Empresas Emisoras</span>
                        <svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                    <div class="nav-sub-list">

                        <div class="nav-sub-list">

                            <a href="javascript:void(0)"
                               hx-get="/app/emisores/view/list"
                               hx-target="#main-content"
                               hx-swap="innerHTML"
                               class="nav-sub-item">Listado de Empresas
                            </a>

                            <a href="javascript:void(0)"
                               hx-get="/app/emisores/view/new"
                               hx-target="#main-content"
                               hx-swap="innerHTML"
                               class="nav-sub-item"> Registrar Nuevo
                            </a>


                            <a href="javascript:void(0)"
                                hx-get="/app/certificados/view/form"
                                hx-target="#main-content"
                                class="nav-sub-item">Certificado Digital
                            </a>

                        </div>


                    </div>
                </div>


                <div class="nav-group">
                    <div class="nav-item toggle-submenu">
                        <span>Comprobantes</span>
                        <svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                    <div class="nav-sub-list">
                        <a href="/facturas" class="nav-sub-item">Listado General</a>
                        <a href="/facturas/lotes" class="nav-sub-item">Lotes Enviados</a>
                    </div>
                </div>

                <div class="nav-group">
                    <div class="nav-item toggle-submenu">
                        <span>Clientes</span>
                        <svg class="nav-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                    <div class="nav-sub-list">
                        <a href="/clientes" class="nav-sub-item">Directorio</a>
                        <a href="/clientes/ruc-online" class="nav-sub-item">RUC Online (SET)</a>
                    </div>
                </div>

                <div class="nav-group">
                    <a href="/perfil" class="nav-item">
                        Mi Perfil de Usuario
                    </a>
                </div>
            </div>

            <div class="nav-bottom">
            </div>
        </nav>
    </aside>


    <main class="main-content" id="main-content">

    </main>
</div>



<script>
    document.addEventListener('DOMContentLoaded', () => {
        document.body.addEventListener('htmx:configRequest', (event) => {
            const token = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
            const header = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
            if (token && header) {
                event.detail.headers[header] = token;
            }
        });
    });
</script>

<script>
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('main-content');
    const overlay = document.getElementById('sidebarOverlay');

    menuToggle.addEventListener('click', () => {
        if (window.innerWidth > 800) {
            sidebar.classList.toggle('is-hidden');
            mainContent.classList.toggle('expanded');
        } else {
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('is-active');
        }
    });

    overlay.addEventListener('click', () => {
        sidebar.classList.remove('mobile-open');
        overlay.classList.remove('is-active');
    });

    document.querySelectorAll('.toggle-submenu').forEach(item => {
        item.addEventListener('click', () => {
            const parent = item.parentElement;
            parent.classList.toggle('is-open');
        });
    });


    // --- Lógica de Logout ---
    const logoutBtn = document.getElementById('logoutAction');

    if (logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
            e.preventDefault(); // Evita que el navegador salte al '#'

            // Llamamos al objeto global que definimos en auth.js
            if (typeof Auth !== 'undefined') {
                Auth.logout();
            } else {
                console.error("Error: El archivo auth.js no se cargó correctamente.");
                window.location.href = '/login'; // Fallback directo
            }
        });
    }
</script>
</body>
</html>
