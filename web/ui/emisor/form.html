<div id="emisor-form-container" class="card fade-in">
    <div class="mb-8" style="padding: 1rem 0; border-bottom: 1px solid var(--ui-border);">
        <h4 class="text-2xl font-bold tracking-tight text-gray-900" th:text="${titulo}">Nuevo Emisor</h4>
        <p class="text-sm text-gray-500 mt-1">Datos fiscales y comerciales de la empresa</p>
    </div>

    <form hx-post="/app/emisores/view/save"
          hx-target="#main-content"
          th:object="${emisor}"
          autocomplete="off">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{configuracion.id}">

        <input type="hidden" id="dep-desc" name="departamentoDescripcion">

        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">RUC y DV</label>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="text" th:field="*{ruc}" class="form-input"
                           style="flex: 4;" placeholder="80000000"
                           th:readonly="${readOnly}" required>
                    <span style="font-weight: bold; color: var(--ui-border);">-</span>
                    <input type="number" th:field="*{rucDv}" class="form-input"
                           style="flex: 1; text-align: center; min-width: 60px;"
                           placeholder="0" min="0" max="9"
                           th:readonly="${readOnly}" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Código (identificador api)</label>
                <input type="text" th:field="*{codEmisor}" class="form-input" placeholder="sinespacios"
                       th:readonly="${readOnly}" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Razón Social</label>
            <input type="text" th:field="*{razonSocial}" class="form-input" placeholder="Nombre legal de la empresa"
                   th:readonly="${readOnly}" required>
        </div>

        <div class="form-group">
            <label class="form-label">Nombre Fantasía</label>
            <input type="text" th:field="*{nombreFantasia}" class="form-input" placeholder="Nombre comercial"
                   th:readonly="${readOnly}">
        </div>

        <div class="grid-3">
            <div class="form-group">
                <label class="form-label">Tipo Contribuyente</label>
                <select th:field="*{tipoContribuyente}" class="form-input" th:disabled="${readOnly}">
                    <option value="1">Persona Física</option>
                    <option value="2">Persona Jurídica</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Timbrado N°</label>
                <input type="text" th:field="*{numeroTimbrado}" class="form-input" placeholder="12345678"
                       th:readonly="${readOnly}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Fecha inicio</label>
                <input type="date" th:field="*{fechaInicioTimbrado}" class="form-input"
                       th:readonly="${readOnly}" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Dirección Calle</label>
            <input type="text" th:field="*{direccion}" class="form-input" placeholder="Calle principal"
                   th:readonly="${readOnly}" required>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">N° Casa (dNumCas)</label>
                <input type="number" th:field="*{numeroCasa}" class="form-input"
                       th:readonly="${readOnly}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Departamento (cDepEmi)</label>
                <select id="dep-select" th:field="*{departamento.id}" class="form-input"
                        th:disabled="${readOnly}" required
                        onchange="document.getElementById('dep-desc').value = this.options[this.selectedIndex].text">
                    <option value="">-- Seleccione --</option>
                    <option th:each="d : ${departamentos}"
                            th:value="${d.id}"
                            th:text="${d.descripcion}"></option>
                </select>
            </div>
        </div>

        <div class="grid-2" style="grid-template-columns: 140px 1fr; gap: 16px;">
            <div class="form-group">
                <label class="form-label">Cód. Actividad</label>
                <input type="number" th:field="*{actividadEconomicaCodigo}"
                       class="form-input" placeholder="62010"
                       th:readonly="${readOnly}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Descripción Actividad</label>
                <input type="text" th:field="*{actividadEconomicaDescripcion}"
                       class="form-input" placeholder="Rubro de la empresa"
                       th:readonly="${readOnly}" required>
            </div>
        </div>

        <div class="mt-8 pt-6" style="border-top: 2px dashed var(--ui-border); padding-top: 24px; background-color: var(--ui-bg-light); padding: 20px; border-radius: 8px;">
            <div class="flex items-center gap-2 mb-4">
                <h4 class="text-sm font-bold uppercase tracking-wider text-blue-600">Configuración Técnica SIFEN</h4>
            </div>

            <div class="grid-3">
                <div class="form-group">
                    <label class="form-label">Ambiente</label>
                    <select th:field="*{configuracion.ambiente}" class="form-input" style="border-color: #dbeafe;" th:disabled="${readOnly}">
                        <option value="test">Test (Pruebas)</option>
                        <option value="prod">Producción</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">ID CSC (SET)</label>
                    <input type="text" th:field="*{configuracion.idCsc}" class="form-input" placeholder="0001"
                           th:readonly="${readOnly}" >
                </div>
                <div class="form-group">
                    <label class="form-label">CSC</label>
                    <input type="text" th:field="*{configuracion.csc}" class="form-input"
                           th:readonly="${readOnly}" >
                </div>
            </div>

            <div class="grid-2 mt-4">
                <div class="form-group">
                    <label class="form-label">API Token (Seguridad)</label>
                    <input type="text" th:field="*{configuracion.apiToken}" class="form-input"
                           placeholder="token api" th:readonly="${readOnly}">
                </div>
            </div>

        </div>

        <div class="form-actions actions-right" style="margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--ui-border);">
            <button type="button" hx-get="/app/emisores/view/list" hx-target="#main-content" class="btn-outline">
                <span th:text="${readOnly} ? 'Volver' : 'Cancelar'">Cancelar</span>
            </button>
            <button type="submit" class="btn" th:if="${readOnly == null || !readOnly}">
                Guardar Configuración
            </button>
        </div>
    </form>
</div>
