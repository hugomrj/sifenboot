<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sifenboot · Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="center-screen">
    <div class="w-full max-w-[380px] fade-in">


        <div class="card">

            <div class="text-center mb-8">
                <h1 class="mt-2 text-2xl font-bold tracking-tight text-gray-900">Iniciar Sesión</h1>
            </div>



            <form id="loginForm"  autocomplete="off">
                <div class="form-group">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="Tu usuario" required>
                </div>

                <div class="form-group"> <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-actions actions-stack">
                    <button type="submit" class="btn btn-lg">
                        Ingresar al Sistema
                    </button>
                </div>

            </form>



        </div>


    </div>
</div>

<script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = '<div class="flex justify-center items-center"><span class="spinner"></span> Verificando...</div>';

        setTimeout(() => {
            window.location.href = 'dashboard.html';
        }, 1500);
    });
</script>

</body>
</html>
