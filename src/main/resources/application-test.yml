spring:
  application:
    name: sifen-api-java
  profiles:
    active: test
  
  # Database Configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/sifen_local}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  # Disable RabbitMQ for testing
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 0
    # Disable auto-configuration
    listener:
      simple:
        auto-startup: false
  
  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
  
  # Servlet Configuration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

# SIFEN Configuration
sifen:
  integration:
    strategy: ${SIFEN_INTEGRATION_STRATEGY:local} # local | stipy
  api:
    base-url: ${SIFEN_API_BASE_URL:https://api.sifen.gov.py}
    timeout: ${SIFEN_API_TIMEOUT:30000}
  validation:
    strict-mode: ${SIFEN_VALIDATION_STRICT:true}
    version: "150"
  rabbitmq:
    exchange:
      document: sifen.document.exchange
      delayed: sifen.delayed.exchange
    queue:
      process: sifen.document.process
      resend: sifen.document.resend
      event: sifen.document.event
      dlq: sifen.document.dlq
      delayed: sifen.document.delayed
    routing:
      process: process
      resend: resend
      event: event
      dlq: dlq
      delayed: delayed

# Logging Configuration
logging:
  level:
    com.sifen.api: DEBUG
    org.springframework.amqp: WARN  # Reduce RabbitMQ logs
    org.springframework.statemachine: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Management Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  show-actuator: true

