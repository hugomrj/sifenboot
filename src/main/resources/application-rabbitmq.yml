spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    connection-timeout: 30000
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
          multiplier: 2.0
    template:
      mandatory: true
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3
        max-interval: 10000
        multiplier: 2.0

sifen:
  rabbitmq:
    exchange:
      document: sifen.document.exchange
      delayed: sifen.delayed.exchange
    queue:
      process: sifen.document.process
      resend: sifen.document.resend
      event: sifen.document.event
      dlq: sifen.document.dlq
      delayed: sifen.document.delayed
    routing:
      process: process
      resend: resend
      event: event
      dlq: dlq
      delayed: delayed

